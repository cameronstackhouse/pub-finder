name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/session-irzd1k
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache-bust versioned assets
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s#style\.css\"#style.css?v=${SHORT_SHA}\"#" index.html
          sed -i "s#app\.js\"#app.js?v=${SHORT_SHA}\"#" index.html
          sed -i "s#data/pubs-gb\.json\"#data/pubs-gb.json?v=${SHORT_SHA}\"#" app.js

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
