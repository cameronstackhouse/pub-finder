name: Update GB pubs dataset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install osmium-tool
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y osmium-tool

      - name: Download Great Britain OSM extract
        run: curl -fL -o gb.osm.pbf https://download.geofabrik.de/europe/great-britain-latest.osm.pbf

      - name: Filter to amenity=pub and export to GeoJSON
        run: |
          osmium tags-filter gb.osm.pbf nwr/amenity=pub -o pubs.osm.pbf --overwrite
          osmium export pubs.osm.pbf -o pubs.geojson --overwrite

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/build-pubs-data.mjs pubs.geojson

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pubs-gb.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GB pubs dataset"
            git push origin HEAD:${{ github.ref_name }}
          fi
